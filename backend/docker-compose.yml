services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finans
      POSTGRES_PASSWORD: finans
      POSTGRES_DB: finans
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finans"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://finans:finans@db:5432/finans
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_VAT_CODE: ${YOOKASSA_VAT_CODE:-1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

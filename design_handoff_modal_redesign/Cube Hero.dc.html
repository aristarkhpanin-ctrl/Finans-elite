<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 720, &quot;height&quot;: 720},
  &quot;accentColor&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:[&quot;#7FEE64&quot;,&quot;#1FAE68&quot;],&quot;tsType&quot;:&quot;string[]&quot;,&quot;options&quot;:[[&quot;#7FEE64&quot;,&quot;#1FAE68&quot;],[&quot;#95F47D&quot;,&quot;#0F8A52&quot;],[&quot;#C6FF4D&quot;,&quot;#7FEE64&quot;],[&quot;#7FEE64&quot;,&quot;#0AD8C7&quot;]],&quot;section&quot;:&quot;Look&quot;},
  &quot;backdrop&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;scene&quot;,&quot;tsType&quot;:&quot;'scene'|'transparent'&quot;,&quot;options&quot;:[&quot;scene&quot;,&quot;transparent&quot;],&quot;section&quot;:&quot;Look&quot;},
  &quot;showEnvironment&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Look&quot;},
  &quot;motionSpeed&quot;: {&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;normal&quot;,&quot;tsType&quot;:&quot;'calm'|'normal'|'energetic'&quot;,&quot;options&quot;:[&quot;calm&quot;,&quot;normal&quot;,&quot;energetic&quot;],&quot;section&quot;:&quot;Motion&quot;},
  &quot;showOrbit&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},
  &quot;pointerTilt&quot;: {&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}
}">

class Component extends DCLogic {
  stageRef = React.createRef();
  rigRef = React.createRef();
  cubeSpinRef = React.createRef();
  coreSpinRef = React.createRef();
  startTime = 0;
  targetX = 0;
  targetY = 0;
  curX = 0;
  curY = 0;
  _raf = null;

  componentDidMount() {
    const el = this.stageRef.current;
    if (el) {
      el.addEventListener('pointermove', this.handlePointerMove);
      el.addEventListener('pointerleave', this.handlePointerLeave);
    }
    this.startTime = performance.now();
    this._raf = requestAnimationFrame(this.loop);
  }

  componentWillUnmount() {
    const el = this.stageRef.current;
    if (el) {
      el.removeEventListener('pointermove', this.handlePointerMove);
      el.removeEventListener('pointerleave', this.handlePointerLeave);
    }
    if (this._raf) cancelAnimationFrame(this._raf);
  }

  loop = (now) => {
    const t = (now || performance.now()) - this.startTime;
    const speedMap = { calm: 0.62, normal: 1, energetic: 1.55 };
    const speed = speedMap[this.props.motionSpeed] || 1;

    const enabled = this.props.pointerTilt ?? true;
    const tx = enabled ? this.targetX : 0;
    const ty = enabled ? this.targetY : 0;
    this.curX += (tx - this.curX) * 0.07;
    this.curY += (ty - this.curY) * 0.07;

    const spinPeriod = 32000 / speed;
    const spinAngle = ((t % spinPeriod) / spinPeriod) * 360;

    const corePeriod = 17000 / speed;
    const coreAngle = ((t % corePeriod) / corePeriod) * 360;

    const bobPeriod = 6500 / speed;
    const bobPhase = ((t % bobPeriod) / bobPeriod) * Math.PI * 2;
    const bobY = -1.142857 + 1.142857 * Math.cos(bobPhase);

    const introDur = 1500;
    const p = Math.min(1, t / introDur);
    const ease = 1 - Math.pow(1 - p, 3);
    const scaleVal = 0.7 + 0.3 * ease;
    const introY = 6.571429 * (1 - ease);

    // Each step is applied on its own ref, in the same outer-to-inner order
    // the original nested divs used (bob -> pointer-tilt -> intro -> spin).
    // Rotations about different axes don't commute, so they must stay as
    // separate composed steps rather than being pre-added into one angle.
    const rig = this.rigRef.current;
    if (rig) {
      rig.style.opacity = ease.toFixed(3);
      rig.style.transform =
        'translateY(' + bobY.toFixed(3) + 'cqmin) ' +
        'rotateX(' + (-this.curY).toFixed(2) + 'deg) ' +
        'rotateY(' + (this.curX).toFixed(2) + 'deg) ' +
        'scale(' + scaleVal.toFixed(3) + ') ' +
        'translateY(' + introY.toFixed(3) + 'cqmin)';
    }

    const cubeSpin = this.cubeSpinRef.current;
    if (cubeSpin) {
      cubeSpin.style.transform = 'rotateX(22deg) rotateY(' + spinAngle.toFixed(2) + 'deg)';
    }

    const coreSpin = this.coreSpinRef.current;
    if (coreSpin) {
      coreSpin.style.transform = 'rotateX(14deg) rotateY(' + coreAngle.toFixed(2) + 'deg)';
    }

    this._raf = requestAnimationFrame(this.loop);
  };

  handlePointerMove = (e) => {
    const el = this.stageRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const nx = (e.clientX - rect.left) / rect.width - 0.5;
    const ny = (e.clientY - rect.top) / rect.height - 0.5;
    this.targetX = nx * 24;
    this.targetY = ny * 24;
  };

  handlePointerLeave = () => {
    this.targetX = 0;
    this.targetY = 0;
  };

  hexToRgb(hex) {
    const h = (hex || '#7FEE64').replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return r + ',' + g + ',' + b;
  }

  renderVals() {
    const palette = Array.isArray(this.props.accentColor) ? this.props.accentColor : ['#7FEE64', '#1FAE68'];
    const c1 = palette[0] || '#7FEE64';
    const c2 = palette[1] || '#1FAE68';
    const speedMap = { calm: 0.62, normal: 1, energetic: 1.55 };
    const speed = speedMap[this.props.motionSpeed] || 1;
    return {
      stageRef: this.stageRef,
      rigRef: this.rigRef,
      cubeSpinRef: this.cubeSpinRef,
      coreSpinRef: this.coreSpinRef,
      accentRgb: this.hexToRgb(c1),
      accent2Rgb: this.hexToRgb(c2),
      speed: speed,
      showOrbit: this.props.showOrbit ?? true,
      showSceneBg: (this.props.backdrop ?? 'scene') !== 'transparent',
      showEnvironment: this.props.showEnvironment ?? true,
    };
  }
}

</script>
